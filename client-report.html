<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buckler Visit Report</title>
  <link rel="icon" href="assets/logo-en.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary-red: #C62828;
      --font-family: 'Inter', sans-serif;
    }

    [dir="rtl"] {
      --font-family: 'Cairo', 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-family);
      background: #F4F6F8;
      color: #1E293B;
      min-height: 100vh;
    }

    .report-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Top action bar (hidden on print) */
    .action-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      justify-content: flex-end;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary { background: #C62828; color: white; }
    .btn-secondary { background: white; border: 1px solid #E2E8F0; color: #1E293B; }

    /* REPORT CARD */
    .report-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .report-header {
      background: linear-gradient(135deg, #C62828 0%, #8B0000 100%);
      color: white;
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .report-header-logo {
      height: 50px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .report-header-title h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .report-header-title p {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .report-meta {
      background: #FAFAFA;
      border-bottom: 1px solid #E2E8F0;
      padding: 1.25rem 2.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748B;
    }

    .meta-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1E293B;
    }

    .report-body {
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #C62828;
      border-bottom: 2px solid #FFEBEE;
      padding-bottom: 0.4rem;
      margin-bottom: 1rem;
    }

    /* Products table */
    .products-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    [dir="rtl"] .products-table {
      text-align: right;
    }

    .products-table th {
      background: #F8FAFC;
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748B;
      border-bottom: 2px solid #E2E8F0;
    }

    [dir="rtl"] .products-table th {
      text-align: right;
    }

    .products-table td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid #F1F5F9;
      color: #334155;
    }

    .info-box {
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.88rem;
      color: #475569;
      line-height: 1.6;
    }

    /* Bait Audits */
    .bait-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    [dir="rtl"] .bait-table {
      text-align: right;
    }

    .bait-table th {
      background: #F8FAFC;
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748B;
      border-bottom: 2px solid #E2E8F0;
    }

    [dir="rtl"] .bait-table th {
      text-align: right;
    }

    .bait-table td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid #F1F5F9;
      color: #334155;
    }

    .badge-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-no-act { background: #F1F5F9; color: #475569; }
    .badge-act { background: #FEF2F2; color: #C62828; }

    /* Photo gallery */
    .photos-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .photos-gallery img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .photos-gallery img:hover { opacity: 0.9; }

    /* Signature Area */
    .signature-area {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .signature-box {
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      padding: 1.25rem;
      background: #FAFAFA;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .sig-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748B;
    }
    .sig-image {
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Footer */
    .report-footer {
      background: #FAFAFA;
      border-top: 1px solid #E2E8F0;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #64748B;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .status-conducted { background: #ECFDF5; color: #047857; }

    @media print {
      body { background: white; }
      .print-hide, .action-bar { display: none !important; }
      .report-wrapper { padding: 0; max-width: 100%; }
      .report-card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="report-wrapper">
    <!-- Action bar -->
    <div class="action-bar print-hide">
      <button class="btn btn-secondary" id="btn-report-toggle-lang">🌐 العربية</button>
      <button class="btn btn-secondary" onclick="window.print()" id="btn-print-report">🖨️ Print Report</button>
    </div>

    <!-- Output Content -->
    <div id="report-output">
      <div style="padding: 3rem; text-align: center; color: #64748B;" id="lbl-loading">
        Loading visit log report details...
      </div>
    </div>
  </div>

  <script src="database.js"></script>
  <script>
    let state = {
      language: localStorage.getItem('buckler_lang') || 'en'
    };

    const translations = {
      en: {
        report_title: "Operation Visit Report",
        client: "Client",
        service: "Service Category",
        date_conducted: "Date Conducted",
        team_leader: "Team Leader",
        region_city: "Region / City",
        time_in_out: "Time In / Out",
        gps_location: "GPS Location",
        conducted: "✓ Conducted",
        observations_title: "Field Observations & Comments",
        materials_title: "Products & Materials Used",
        bait_title: "Bait Station Audit",
        photos_title: "Visit Photos",
        review_title: "Client Review & Sign-Off",
        client_feedback: "Client Feedback",
        client_signature: "Client Signature",
        loading: "Loading visit log report details...",
        no_signature: "No signature recorded.",
        no_photos: "No photos attached.",
        no_mats: "No chemical/materials consumed during this service.",
        no_audits: "No device audits logged.",
        station_no: "Station #",
        location: "Location",
        activity: "Activity Status",
        notes: "Notes",
        item_name: "Item Name",
        item_code: "Code",
        qty: "Qty",
        print_report: "🖨️ Print Report",
        share_email: "📧 Share via Email",
        share_whatsapp: "🟢 Share via WhatsApp",
        brand_footer: "Buckler Pest Control — Iraq Operations",
        generated: "Generated"
      },
      ar: {
        report_title: "تقرير زيارة عملية المكافحة",
        client: "العميل",
        service: "نوع الخدمة",
        date_conducted: "تاريخ الخدمة",
        team_leader: "مسؤول الفريق",
        region_city: "المنطقة / المدينة",
        time_in_out: "وقت الدخول / الخروج",
        gps_location: "الموقع الجغرافي GPS",
        conducted: "✓ منجزة",
        observations_title: "ملاحظات وتوصيات الفني الميداني",
        materials_title: "المنتجات والمواد المستخدمة",
        bait_title: "تدقيق محطات الطعوم",
        photos_title: "صور الزيارة الميدانية",
        review_title: "مراجعة العميل والتوقيع المعتمد",
        client_feedback: "ملاحظات العميل",
        client_signature: "توقيع العميل",
        loading: "جاري تحميل تفاصيل تقرير الزيارة...",
        no_signature: "لا يوجد توقيع مسجل.",
        no_photos: "لا توجد صور مرفقة.",
        no_mats: "لم يتم استخدام أي مواد أو مبيدات خلال هذه الخدمة.",
        no_audits: "لم يتم تسجيل أي تدقيق للأجهزة.",
        station_no: "رقم المحطة",
        location: "الموقع",
        activity: "حالة النشاط",
        notes: "ملاحظات",
        item_name: "اسم المادة",
        item_code: "الرمز",
        qty: "الكمية",
        print_report: "🖨️ طباعة التقرير",
        share_email: "📧 مشاركة عبر البريد",
        share_whatsapp: "🟢 مشاركة عبر واتساب",
        brand_footer: "شركة باكلر لمكافحة الآفات — عمليات العراق",
        generated: "تم الإنشاء"
      }
    };

    function t(key) {
      const lang = state.language || 'en';
      if (translations[lang] && translations[lang][key]) {
        return translations[lang][key];
      }
      return key;
    }

    function translateStaticControls() {
      const lang = state.language || 'en';
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      
      const langBtn = document.getElementById('btn-report-toggle-lang');
      if (langBtn) {
        langBtn.textContent = lang === 'ar' ? '🌐 English' : '🌐 العربية';
      }
      
      document.getElementById('btn-print-report').textContent = t('print_report');
      document.getElementById('lbl-loading').textContent = t('loading');
    }

    document.addEventListener('DOMContentLoaded', () => {
      translateStaticControls();

      const params = new URLSearchParams(window.location.search);
      const logId = params.get('logId');
      const schedId = params.get('schedId');

      // Wait for database engine load
      setTimeout(() => {
        renderReport(logId, schedId);

        // Language Switcher Bind
        document.getElementById('btn-report-toggle-lang').onclick = () => {
          state.language = state.language === 'ar' ? 'en' : 'ar';
          localStorage.setItem('buckler_lang', state.language);
          translateStaticControls();
          renderReport(logId, schedId);
        };
      }, 300);
    });

    function renderReport(logId, schedId) {
      const output = document.getElementById('report-output');
      const allLogs = window.BucklerDB.getLogs('All') || [];
      const schedules = window.BucklerDB.get('schedules') || [];
      const clients = window.BucklerDB.get('clients') || [];
      const items = window.BucklerDB.get('items') || [];
      const users = window.BucklerDB.get('users') || [];

      let log = null;
      let sch = null;

      if (logId) {
        log = allLogs.find(l => l.id === logId);
        if (log) {
          sch = schedules.find(s => s.id === log.scheduleId);
        }
      } else if (schedId) {
        sch = schedules.find(s => s.id === schedId);
        log = allLogs.find(l => l.scheduleId === schedId);
      }

      if (!sch) {
        output.innerHTML = `
          <div style="padding:4rem; text-align:center; color:#C62828; font-weight:700;">
            ⚠️ Operational schedule log not found.
          </div>
        `;
        return;
      }

      const client = clients.find(c => c.id === sch.clientId);
      const clientName = client ? client.name : 'Unknown Client';
      const region = sch.region;
      const city = sch.city || 'N/A';
      const service = sch.service;
      const dateStr = log ? log.dateConducted : sch.date;
      
      const tlIds = sch.teamLeaderId ? sch.teamLeaderId.split(',').map(x => x.trim()) : [];
      const tlNames = tlIds.map(id => {
        const u = users.find(x => x.id === id);
        return u ? u.name : id;
      }).join(', ') || 'Unassigned';

      // 1. Products HTML
      let productsHTML = `<p style="color:#64748B; font-style:italic; font-size:0.85rem;">${t('no_mats')}</p>`;
      if (log && log.itemsConsumed && log.itemsConsumed.length) {
        const rows = log.itemsConsumed.map(cons => {
          const itm = items.find(i => i.id === cons.itemId);
          const itmName = itm ? itm.name : cons.itemId;
          const itmCode = itm ? (itm.itemCode || '-') : '-';
          const itmUnit = itm ? itm.unit : '';
          const locationBadge = cons.location ? ` <span style="font-size:0.7rem; font-weight:700; background:#EFF6FF; color:#1E40AF; padding:2px 6px; border-radius:4px; margin-left:6px; display:inline-block; border:1px solid #BFDBFE;">📍 ${cons.location}</span>` : '';
          const itmPic = itm && itm.picture ? `<img src="${itm.picture}" style="width:28px; height:28px; border-radius:4px; object-fit:cover; vertical-align:middle; margin-right:8px; border:1px solid #E2E8F0;" />` : '';
          return `
            <tr>
              <td><div style="display:flex; align-items:center;">${itmPic}<div><strong>${itmName}</strong>${locationBadge}</div></div></td>
              <td><code>${itmCode}</code></td>
              <td><strong>${cons.qty} ${itmUnit}</strong></td>
            </tr>
          `;
        }).join('');
        productsHTML = `
          <div class="table-wrapper">
            <table class="products-table">
              <thead>
                <tr>
                  <th>${t('item_name')}</th>
                  <th>${t('item_code')}</th>
                  <th>${t('qty')}</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        `;
      }

      // 2. Bait Station Audit HTML
      let baitHTML = `<p style="color:#64748B; font-style:italic; font-size:0.85rem;">${t('no_audits')}</p>`;
      if (log && log.baitStationsAudit && log.baitStationsAudit.length) {
        const rows = log.baitStationsAudit.map(b => {
          const badgeClass = b.activity !== 'No Activity' ? 'badge-act' : 'badge-no-act';
          const translatedActivity = b.activity === 'No Activity' ? (state.language === 'ar' ? 'لا يوجد نشاط' : 'No Activity') : b.activity;
          return `
            <tr>
              <td><strong>${t('stations')} #${b.stationNumber}</strong></td>
              <td>${b.location}</td>
              <td><span class="badge-status ${badgeClass}">${translatedActivity}</span></td>
              <td><em>${b.comment || '-'}</em></td>
            </tr>
          `;
        }).join('');
        baitHTML = `
          <div class="table-wrapper">
            <table class="bait-table">
              <thead>
                <tr>
                  <th>${t('station_no')}</th>
                  <th>${t('location')}</th>
                  <th>${t('activity')}</th>
                  <th>${t('notes')}</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        `;
      }

      // Signature
      let signatureHTML = `<div style="color:#94A3B8; font-style:italic; font-size:0.82rem;">${t('no_signature')}</div>`;
      if (log && log.clientSignature) {
        signatureHTML = `<img src="${log.clientSignature}" style="max-height:80px; max-width:100%;" alt="Client Signature" />`;
      }

      // Photos
      let photosHTML = `<p style="color:#94A3B8; font-style:italic; font-size:0.85rem;">${t('no_photos')}</p>`;
      if (log && log.pictures && log.pictures.length) {
        photosHTML = `<div class="photos-gallery">${log.pictures.map(p => `<img src="${p}" alt="Visit Photo" />`).join('')}</div>`;
      }

      const reportDate = new Date().toLocaleDateString(state.language === 'ar' ? 'ar-EG' : 'en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
      const capitalizedService = service.split(',').map(s => s.trim().charAt(0).toUpperCase() + s.trim().slice(1)).join(', ');

      output.innerHTML = `
        <div class="report-card">
          <!-- Header -->
          <div class="report-header">
            <div>
              <img src="assets/logo-en.png" class="report-header-logo" alt="Buckler" />
            </div>
            <div class="report-header-title" style="text-align: inherit;">
              <h1 style="color: white;">${t('report_title')}</h1>
              <p style="color: white; opacity: 0.9;">${capitalizedService} — ${dateStr}</p>
              <span class="status-badge status-conducted" style="margin-top:0.4rem; display:inline-block;">${t('conducted')}</span>
            </div>
          </div>

          <!-- Meta grid -->
          <div class="report-meta">
            <div class="meta-item">
              <span class="meta-label">${t('client')}</span>
              <span class="meta-value">${clientName}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t('service')}</span>
              <span class="meta-value" style="text-transform:capitalize;">${capitalizedService}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t('date_conducted')}</span>
              <span class="meta-value">${dateStr}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t('team_leader')}</span>
              <span class="meta-value">${tlNames}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t('region_city')}</span>
              <span class="meta-value">${region} — ${city}</span>
            </div>
            ${log && log.timeIn ? `
            <div class="meta-item">
              <span class="meta-label">${t('time_in_out')}</span>
              <span class="meta-value">${log.timeIn} – ${log.timeOut || 'N/A'} (${log.timeSpent || 'N/A'})</span>
            </div>` : ''}
            ${log && log.geoLocation ? `
            <div class="meta-item">
              <span class="meta-label">${t('gps_location')}</span>
              <span class="meta-value"><a href="https://www.google.com/maps?q=${encodeURIComponent(log.geoLocation)}" target="_blank" style="color:#C62828;">${log.geoLocation}</a></span>
            </div>` : ''}
          </div>

          <!-- Body -->
          <div class="report-body">

            <!-- Comments / Observations -->
            ${log && log.comments ? `
            <div>
              <div class="section-title">${t('observations_title')}</div>
              <div class="info-box">${log.comments}</div>
            </div>` : ''}

            <!-- Products Consumed -->
            <div>
              <div class="section-title">${t('materials_title')}</div>
              ${productsHTML}
            </div>

            <!-- Bait Station Audit -->
            <div>
              <div class="section-title">${t('bait_title')}</div>
              ${baitHTML}
            </div>

            <!-- Visit Photos -->
            <div>
              <div class="section-title">${t('photos_title')}</div>
              ${photosHTML}
            </div>

            <!-- Client Review -->
            <div>
              <div class="section-title">${t('review_title')}</div>
              <div class="signature-area">
                ${log && log.clientComments ? `
                <div class="signature-box">
                  <div class="sig-label">${t('client_feedback')}</div>
                  <div class="info-box">${log.clientComments}</div>
                </div>` : ''}
                <div class="signature-box">
                  <div class="sig-label">${t('client_signature')}</div>
                  <div class="sig-image">${signatureHTML}</div>
                </div>
              </div>
            </div>

          </div>

          <!-- Footer -->
          <div class="report-footer">
            <div>
              <strong>${t('brand_footer')}</strong><br/>
              ${t('generated')}: ${reportDate}
            </div>
            <div class="print-hide" style="display:flex; gap:0.75rem; align-items:center;">
              <a href="mailto:?subject=Visit Report - ${clientName}&body=Please find the visit report at: ${encodeURIComponent(window.location.href)}" style="font-size:0.75rem; color:#C62828; text-decoration:none; font-weight:700;">${t('share_email')}</a>
              <a href="https://api.whatsapp.com/send?phone=${client && client.phone ? client.phone.trim().replace(/[^\d+]/g, '') : ''}&text=${encodeURIComponent(`Please find your visit report here:\n${window.location.href}`)}" target="_blank" style="font-size:0.75rem; color:#25D366; text-decoration:none; font-weight:700; display:inline-flex; align-items:center; gap:3px;">${t('share_whatsapp')}</a>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
